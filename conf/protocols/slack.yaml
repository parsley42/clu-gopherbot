ProtocolConfig:
  MaxMessageSplit: {{ env "GOPHER_SLACK_MAX_MSGS" | default "2" }}
{{ if env "SLACK_LEGACY" }}
  SlackToken: {{ secret "SLACK_LEGACY_TOKEN" | printf "%q" }}
{{ else }}
  AppToken: {{ secret "SLACK_APP_TOKEN" | printf "%q" }}
  BotToken: {{ secret "SLACK_BOT_TOKEN" | printf "%q" }}
{{ end}}
  AcceptSlashCommands: true
  SlashCommand: /clu
  HearSelf: true
  UserMap:
    # Floyd hasn't run in years, but we keep the reference around for nostalgia
    floyd: U138KTVCL
    clu: U03MFS3PHMF
    adrienne: U0JM3H95G
    parsley: U0JLW8EMS
