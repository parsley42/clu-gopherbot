---
# Keep stock memes from gopherbot/conf/plugins/memes.yaml and append Clu custom
# commands with v3 metadata keys.
Disabled: false
AppendCommands:
- Command: "806713"
  Regex: '(?i:(.+ .+) (derp!?))'
  Keywords: [ "meme", "derp" ]
  Usage: "<something> derp"
  Summary: "shortest path to DERP"
- Command: "806713"
  Regex: '(?i:derpface ([^/]+)(?:/([^/]+))?)'
  Keywords: [ "meme", "derp" ]
  Usage: "derpface <something>/<something>"
  Summary: "when you need a DERP face"
- Command: "27584969"
  Regex: '(?i:batderp ([^/]+)(?:/([^/]+))?)'
  Keywords: [ "meme", "derp", "batman" ]
  Usage: "batderp <something>/<something>"
  Summary: "for heroicly Bat-tastic DERPS"
- Command: "28387334"
  Regex: '(?i:derpgiraffe ([^/]+)(?:/([^/]+))?)'
  Keywords: [ "meme", "derp", "giraffe" ]
  Usage: "derpgiraffe <something>/<something>"
  Summary: "a derp for animal lovers"
- Command: "14859329"
  Regex: '(?i:sheenderp ([^/]+)(?:/([^/]+))?)'
  Keywords: [ "meme", "derp", "charlie", "sheen" ]
  Usage: "sheenderp <something>/<something>"
  Summary: "when you ask yourself have I taken too many meds"
- Command: "43953962"
  Regex: '(?i:derpcat ([^/]+)(?:/([^/]+))?)'
  Keywords: [ "meme", "derp", "cat", "kitten" ]
  Usage: "derpcat <something>/<something>"
  Summary: "adorable / disturbing derp"
Config:
  Username: dpmemer
  Password: {{ secret "IMGFLIP_PASSWORD" | printf "%q" }}
